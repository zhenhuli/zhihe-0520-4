<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>民族打击乐节奏编辑器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🥁 民族打击乐节奏编辑器</h1>
      <p class="subtitle">木鱼 · 堂鼓 · 铜锣 · 自由编排</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="tempo">速度 (BPM):</label>
        <input type="range" id="tempo" min="40" max="200" value="100">
        <span id="tempoValue">100</span>
      </div>

      <div class="control-group">
        <label for="beats">每小节拍数:</label>
        <select id="beats">
          <option value="4">4/4</option>
          <option value="3">3/4</option>
          <option value="2">2/4</option>
          <option value="6">6/8</option>
        </select>
      </div>

      <div class="control-group">
        <label for="measures">小节数:</label>
        <input type="number" id="measures" min="1" max="32" value="4">
      </div>

      <div class="control-group">
        <label>
          <input type="checkbox" id="loop" checked>
          循环播放
        </label>
      </div>

      <div class="transport">
        <button id="playBtn" class="btn btn-primary">▶ 播放</button>
        <button id="stopBtn" class="btn">⏹ 停止</button>
        <button id="clearBtn" class="btn btn-danger">🗑 清空</button>
      </div>
    </div>

    <div class="segment-controls">
      <div class="control-group">
        <label for="segmentStart">循环起点:</label>
        <input type="number" id="segmentStart" min="0" value="0" step="0.5">
        <span>拍</span>
      </div>
      <div class="control-group">
        <label for="segmentEnd">循环终点:</label>
        <input type="number" id="segmentEnd" min="0.5" value="16" step="0.5">
        <span>拍</span>
      </div>
      <button id="setSegmentBtn" class="btn btn-secondary">设置循环段</button>
      <button id="resetSegmentBtn" class="btn">重置</button>
    </div>

    <div class="tracks-container">
      <div id="tracks"></div>
    </div>

    <div class="velocity-panel">
      <h3>击打力度设置</h3>
      <p>点击节拍格子切换：静音 → 轻击 → 中强 → 强</p>
      <div class="velocity-legend">
        <span class="vel-0">⬜ 静音</span>
        <span class="vel-1">▫ 轻击</span>
        <span class="vel-2">▪ 中强</span>
        <span class="vel-3">⬛ 强</span>
      </div>
    </div>

    <div class="patterns">
      <h3>预设节奏型</h3>
      <div class="pattern-buttons">
        <button class="btn btn-pattern" data-pattern="basic">基础节奏</button>
        <button class="btn btn-pattern" data-pattern="festive">喜庆锣鼓</button>
        <button class="btn btn-pattern" data-pattern="drum-solo">鼓独奏</button>
        <button class="btn btn-pattern" data-pattern="gongs">铜锣阵阵</button>
      </div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
